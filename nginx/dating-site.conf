server {
    listen 80;
    server_name 176.123.164.182 _;

    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /uploads/ {
        alias /var/www/datego/uploads/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}

# Telegram webhook — Nginx handles TLS, proxies to bot HTTP server
server {
    listen 8443 ssl;
    server_name 176.123.164.182;

    ssl_certificate /var/www/datego/webhook.pem;
    ssl_certificate_key /var/www/datego/webhook.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location /bot/webhook {
        proxy_pass http://127.0.0.1:8444;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
