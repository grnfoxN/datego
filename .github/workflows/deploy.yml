name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            cd /var/www/datego
            git pull origin main

            # Backend
            cd /var/www/datego/backend
            source venv/bin/activate
            pip install -r requirements.txt -q
            alembic upgrade head
            sudo systemctl restart datego-backend

            # Bot
            cd /var/www/datego/bot
            source venv/bin/activate
            pip install -r requirements.txt -q
            sudo systemctl restart datego-bot

            # Frontend
            cd /var/www/datego/frontend
            npm install --legacy-peer-deps
            npm run build
            pm2 restart datego-frontend || pm2 start ecosystem.config.js
            pm2 save
