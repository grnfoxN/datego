name: Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            cd /var/www/datego
            git pull origin master

            # Backend
            /var/www/datego/backend/venv/bin/pip install -r /var/www/datego/backend/requirements.txt -q
            /var/www/datego/backend/venv/bin/alembic -c /var/www/datego/backend/alembic.ini upgrade head
            systemctl restart datego-backend

            # Bot
            /var/www/datego/bot/venv/bin/pip install aiogram==3.15.0 httpx aiohttp -q
            systemctl restart datego-bot

            # Frontend
            cd /var/www/datego/frontend
            npm install --legacy-peer-deps
            NEXT_PUBLIC_API_URL=https://datego.pro npm run build
            pm2 restart datego-frontend
            pm2 save
